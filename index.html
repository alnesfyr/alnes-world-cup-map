async function checkIn(){

let city = document.getElementById("city").value;

async function loadCountries(){

SUPABASE_URL + "/rest/v1/visitors?select=country",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY
}

<script>

const mapWidth = 900;
const mapHeight = 500;

const svg = d3.select("#worldMap");

const projection = d3.geoNaturalEarth1()
    .scale(160)
    .translate([mapWidth / 2, mapHeight / 2]);

const path = d3.geoPath()
    .projection(projection);


async function loadMap() {

    // Get world map
    const worldData = await d3.json(
        "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"
    );

    const countries = topojson.feature(
        worldData,
        worldData.objects.countries
    );


    // Get visitor data from Supabase
    const response = await fetch(
        SUPABASE_URL + "/rest/v1/visitors",
        {
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": "Bearer " + SUPABASE_KEY
            }
        }
    );

    const visitors = await response.json();

    const latestVisitors = visitors
    .slice(-5)
    .reverse();

let feedHTML = "";

latestVisitors.forEach(visitor => {

    feedHTML += `
        <div class="feed-item">
            <div class="feed-time">🟢 Recent check-in</div>
            <strong>${visitor.name}</strong><br>
            📍 ${visitor.city}, ${visitor.country}
        </div>
    `;

});

document.getElementById("liveFeed").innerHTML = feedHTML;

    // Count visitors per country
  const countryCounts = {};

const countryNames = {
    "Norway": "Norway",
    "Germany": "Germany",
    "France": "France"
};

visitors.forEach(visitor => {

    const code = countryNames[visitor.country];

    if (code) {

        if (!countryCounts[code]) {
            countryCounts[code] = 0;
        }

        countryCounts[code]++;

    }

});

const sortedCountries = Object.entries(countryCounts)
    .sort((a, b) => b[1] - a[1]);

const medals = ["🥇", "🥈", "🥉"];

let leaderboardHTML = "";

sortedCountries.forEach((country, index) => {

    const medal = medals[index] || `${index + 1}.`;

    leaderboardHTML += `
        <div class="leaderboard-row">
            <span>${medal} ${country[0]}</span>
            <span>${country[1]} 👥</span>
        </div>
    `;

});

document.getElementById("leaderboard").innerHTML = leaderboardHTML;
    
   svg.selectAll("path")
    .data(countries.features)
    .enter()
    .append("path")
    .attr("d", path)
.on("mouseover", function(event, d) {

    const name = d.properties.name;
    const visitors = countryCounts[name] || 0;

    d3.select(this)
        .attr("stroke-width", 2);

    d3.select("#tooltip")
        .style("display", "block")
        .html(
            "🌍 " + name + "<br>" +
            visitors + " visitors checked in"
        );

})
.on("mousemove", function(event) {

    d3.select("#tooltip")
        .style("left", (event.pageX + 15) + "px")
        .style("top", (event.pageY + 15) + "px");

})
.on("mouseout", function() {

    d3.select(this)
        .attr("stroke-width", 0.5);

    d3.select("#tooltip")
        .style("display", "none");

})
        .attr("stroke", "white")
       .attr("fill", function(d) {

    const country = countryCounts[d.properties.name];

    if (!country) {
        return "#1b7a45";
    }

    const intensity = Math.min(country / 10, 1);

 return `rgba(255, 215, 0, ${intensity + 0.3})`;


});

}

loadMap();

</script>
    
</body>
