<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alnes Fyr World Cup Passport</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #063b22;
    color: white;
    text-align: center;
}

header {
    padding: 40px 20px;
    background: #0b5c35;
}

h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.counter {
    font-size: 24px;
    margin: 20px;
}

.card {
    background: white;
    color: black;
    margin: 20px auto;
    padding: 25px;
    border-radius: 15px;
    max-width: 500px;
}

button {
    background: #d4af37;
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 30px;
    cursor: pointer;
}

select, input {
    width: 90%;
    padding: 12px;
    margin: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

#countries {
    margin-top: 20px;
}
</style>

</head>

<body>

<header>
<h1>⚽ Alnes Fyr World Cup Passport 🌍</h1>
<p>Help us fill the world map with visitors from around the world!</p>
</header>

<div class="counter">
🌍 Countries visited: <span id="countryCount">0</span>
</div>

<div class="card">

<h2>Check in</h2>

<select id="country">
<option value="">Choose your country</option>
<option>Norway</option>
<option>Germany</option>
<option>France</option>
<option>Spain</option>
<option>England</option>
<option>USA</option>
<option>Canada</option>
<option>Japan</option>
<option>Brazil</option>
<option>Australia</option>
</select>

<input id="city" placeholder="City (optional)">

<input id="name" placeholder="Name (optional)">

<br>

<button onclick="checkIn()">⚽ Check In</button>

</div>

<div class="card">
<h2>🌍 Countries that have visited</h2>
<p id="countries">Loading...</p>
</div>


<script>

const SUPABASE_URL = "https://vyymflckwkvnlwfgeiot.supabase.co/rest/v1/";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5eW1mbGNrd2t2bmx3ZmdlaW90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNTI2NjcsImV4cCI6MjA5ODkyODY2N30.xWX3wd69DvVhO85ToNbvmYo1SLofFmp12QwpPozuJJI";


async function checkIn(){

let country = document.getElementById("country").value;
let city = document.getElementById("city").value;
let name = document.getElementById("name").value;

if(!country){
alert("Please choose your country!");
return;
}

await fetch(
SUPABASE_URL + "/rest/v1/visitors",
{
method:"POST",
headers:{
"apikey": SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY,
"Content-Type":"application/json"
},
body: JSON.stringify({
country:country,
city:city,
name:name
})
});

alert("🎉 Welcome to Alnes Fyr! Your country has been added!");

loadCountries();

}


async function loadCountries(){

let response = await fetch(
SUPABASE_URL + "/rest/v1/visitors?select=country",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY
}
});

let data = await response.json();

let countries=[...new Set(data.map(x=>x.country))];

document.getElementById("countryCount").innerHTML=countries.length;

document.getElementById("countries").innerHTML =
countries.join(" 🌍 ");

}

loadCountries();

</script>

</body>
</html>
